services:
  catalyst-rdm-sync:
    build: .
    image: catalyst-rdm-sync:latest
    container_name: catalyst-rdm-sync
    restart: unless-stopped
    ports:
      - "8080:8080"
    # Optional: load .env if present. Not required — you can leave it out and
    # configure everything in the UI under Settings (persisted in the DB volume).
    env_file:
      - path: .env
        required: false
    volumes:
      - catalyst_rdm_data:/data

volumes:
  catalyst_rdm_data:
