services:
  catalyst-rdm-sync:
    build: .
    image: catalyst-rdm-sync:latest
    container_name: catalyst-rdm-sync
    restart: unless-stopped
    ports:
      - "8080:8080"
    # No .env is required: start the stack and configure everything in the UI
    # under Settings (persisted in the /data volume). To seed config from a file
    # instead, create it (cp .env.example .env) and uncomment the two lines below.
    #env_file:
    #  - .env
    volumes:
      - catalyst_rdm_data:/data

volumes:
  catalyst_rdm_data:
